<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="jokerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="96" fill="url(#jokerGrad)" opacity="0.08"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#jokerGrad)" stroke-width="2" opacity="0.2"/>

  <!-- 盒子主体 -->
  <rect x="45" y="85" width="110" height="80" rx="14" fill="url(#jokerGrad)" filter="url(#shadow)"/>

  <!-- 盒子开口（内部暗色） -->
  <rect x="55" y="75" width="90" height="20" rx="8" fill="#1a1a2e" opacity="0.3"/>

  <!-- 小丑帽 -->
  <path d="M 100 28 L 68 78 L 132 78 Z" fill="url(#jokerGrad)"/>
  <circle cx="100" cy="24" r="10" fill="url(#jokerGrad)"/>
  <circle cx="100" cy="24" r="4" fill="#fff"/>

  <!-- 帽子褶皱 -->
  <path d="M 84 78 Q 100 65 116 78" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- 盒子上的笑脸 -->
  <circle cx="80" cy="125" r="6" fill="#fff"/>
  <circle cx="120" cy="125" r="6" fill="#fff"/>
  <path d="M 75 142 Q 100 158 125 142" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- 盒子装饰线条 -->
  <path d="M 55 85 L 145 85" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
</svg>
